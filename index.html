<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCEAN DELUXE TMA</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            /* Интеграция с переменными Telegram */
            --bg: #030712;
            --surface: #0f172a;
            --gold: #c5a059;
            --gold-bright: #e2c082;
            --white: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(197, 160, 89, 0.2);
            --serif: 'Cormorant Garamond', serif;
            --sans: 'Montserrat', sans-serif;
            --ani: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Адаптация под системные цвета Telegram, если нужно */
        body.tg {
            background-color: var(--tg-theme-bg-color, var(--bg));
            color: var(--tg-theme-text-color, var(--white));
        }

        * { margin:0; padding:0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { overflow-x: hidden; width: 100%; }
        body { background: var(--bg); font-family: var(--sans); line-height: 1.5; }
        .container { padding: 0 20px; width: 100%; }
        .serif { font-family: var(--serif); font-weight: 600; }

        /* --- HEADER --- */
        .header { 
            position: sticky; top:0; width:100%; z-index: 1000; 
            padding: 15px 0; background: rgba(3, 7, 18, 0.95); 
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); 
        }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--serif); font-size: 22px; letter-spacing: 2px; font-weight: 600; color: white; text-decoration: none; }
        .logo span { color: var(--gold); }
        
        .cart-status { color: var(--gold); font-size: 12px; font-weight: 600; letter-spacing: 1px; }

        /* --- HERO --- */
        .hero { 
            padding: 40px 0; text-align: center;
            background: linear-gradient(rgba(3,7,18,0.8), rgba(3,7,18,0.8)), 
                        url('https://images.unsplash.com/photo-1559742811-822873691df8?q=80&w=1000') center/cover;
        }
        .hero h1 { font-size: 36px; line-height: 1; margin-bottom: 15px; }
        .hero p { color: var(--text-dim); font-size: 14px; max-width: 280px; margin: 0 auto; }

        /* --- CATEGORIES (Horizontal Scroll) --- */
        .category-nav { 
            background: var(--bg); position: sticky; top: 58px; 
            z-index: 900; padding: 15px 0; border-bottom: 1px solid var(--border); 
        }
        .category-list { display: flex; gap: 20px; overflow-x: auto; scrollbar-width: none; padding: 0 20px; }
        .category-list::-webkit-scrollbar { display: none; }
        .cat-tab { 
            white-space: nowrap; cursor: pointer; font-size: 11px; 
            text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); transition: var(--ani); 
        }
        .cat-tab.active { color: var(--gold); font-weight: 600; }

        /* --- CATALOG --- */
        .catalog { padding: 20px 0 100px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { 
            background: var(--surface); padding: 15px; border: 1px solid rgba(255,255,255,0.02); 
            display: flex; flex-direction: column; transition: var(--ani);
        }
        .p-img { width:100%; aspect-ratio:1/1; background: #070b14; margin-bottom: 12px; object-fit: cover; border-radius: 4px; }
        .p-name { font-family: var(--serif); font-size: 16px; margin-bottom: 8px; height: 40px; overflow: hidden; line-height: 1.2; }
        .p-price { font-size: 16px; font-weight: 600; color: var(--gold); margin-bottom: 10px; }
        
        .btn-add { 
            width: 100%; background: none; border: 1px solid var(--gold); color: var(--gold); 
            padding: 8px; cursor: pointer; font-size: 10px; text-transform: uppercase; 
            font-weight: 600; transition: 0.2s; 
        }
